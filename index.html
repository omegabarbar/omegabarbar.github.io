<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capsah Scoreboard</title>

<style>
*{box-sizing:border-box;}
body{font-family:Arial;background:#0f1720;color:white;padding:15px;margin:0;}
h1{text-align:center;}
button{padding:10px;border:none;border-radius:6px;margin:5px;cursor:pointer;}
.kick{background:orange;}
.reset{background:red;color:white;}
.board{display:flex;flex-direction:column;gap:20px;}
.tableBox{background:#1b2430;padding:10px;border-radius:10px;overflow-x:auto;}
input{background:#111827;color:white;border:none;text-align:center;}
.plus{color:#00e676;}
.minus{color:#ff5252;}
</style>
</head>

<body>

<h1>CAPSAH SCOREBOARD</h1>

MATA:
<input id="mata" type="number" value="200" oninput="saveGame()">

<br>

<button class="kick" onclick="kick()">KICK</button>
<button class="reset" onclick="resetGame()">RESET</button>

<div id="tables" class="board"></div>

<script>

let players=4
let rounds=25

function buatTabel(id,start=[0,0,0,0],names=["P1","P2","P3","P4"]){

let div=document.createElement("div")
div.className="tableBox"

let html=`<h3>SET ${id+1}</h3><table id="table${id}">`

html+=`<tr><th>Rnd</th>`
for(let i=0;i<players;i++){
html+=`<th><input value="${names[i]}" onchange="saveGame()"></th>`
}
html+=`</tr>`

// ROUND 0 
html+=`<tr><td>0</td>`
for(let i=0;i<players;i++){
html+=`<td><input value="${start[i]}" readonly></td>`
}
html+=`</tr>`

// ROUND 1-25
for(let r=1;r<=rounds;r++){
html+=`<tr><td>${r}</td>`
for(let p=0;p<players;p++){
html+=`<td><input type="number" oninput="hitung(${id});saveGame()"></td>`
}
html+=`</tr>`
}

html+=`<tr><td>Total</td>`
for(let i=0;i<players;i++){
html+=`<td id="p${id}_${i}">0</td>`
}
html+=`</tr>`

html+=`<tr><td>IDR</td>`
for(let i=0;i<players;i++){
html+=`<td id="b${id}_${i}">Rp 0</td>`
}
html+=`</tr></table>`

div.innerHTML=html
document.getElementById("tables").appendChild(div)

}

function hitung(id){

let table=document.getElementById("table"+id)
let total=[0,0,0,0]

// MULAI DARI ROW 2
for(let i=2;i<table.rows.length-2;i++){

for(let j=1;j<=players;j++){

let val=table.rows[i].cells[j].children[0].value
if(val!="") total[j-1]+=parseInt(val)

}

}

let mata=parseInt(document.getElementById("mata").value)||0

for(let i=0;i<players;i++){

document.getElementById(`p${id}_${i}`).innerText=total[i]

let bayar=0

for(let j=0;j<players;j++){
if(i!=j){
bayar+=(total[j]-total[i])
}
}

bayar*=mata

let cell=document.getElementById(`b${id}_${i}`)
cell.innerText="Rp "+bayar.toLocaleString("id-ID")
cell.className=bayar<0?"minus":"plus"

}

}

function kick(){

let tables=document.querySelectorAll("table")
let last=tables[tables.length-1]

let totals=[]

for(let i=0;i<players;i++){
totals.push(parseInt(last.querySelector(`#p${tables.length-1}_${i}`).innerText))
}

buatTabel(tables.length,totals)

saveGame()

}

function saveGame(){

let data={
mata:document.getElementById("mata").value,
html:document.getElementById("tables").innerHTML
}

localStorage.setItem("capsah",JSON.stringify(data))

}

function loadGame(){

let data=localStorage.getItem("capsah")

if(!data){
buatTabel(0)
return
}

data=JSON.parse(data)

document.getElementById("mata").value=data.mata
document.getElementById("tables").innerHTML=data.html

}

function resetGame(){
localStorage.clear()
location.reload()
}

loadGame()

</script>

</body>
</html>
